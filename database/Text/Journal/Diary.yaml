oct31: |
	So much has happened today. 
	Feels like this is all a 
	big dream.
	
	I woke up in a strange forest,
	with a weird looking sky. 
	Some of my things were laying 
	around, but this journal was 
	nowhere to be found.
	The place is filled with wild 
	monsters that attack me on 
	sight, but I was able to 
	defend myself using my Aura 
	magic.
	[page]
	In that forest I found an 
	adorable little water spirit, 
	which I named Alcine. 
	They really helped me with 
	their healing magic, It's 
	really something I should 
	learn to do myself.
	
	Together we explored a ruined 
	city. From there I got a good
	view of this place, with it's 
	grid patters in the distance.
	
	It must be so far from my 
	home.
	[page]
	This is a little map I drew, 
	and Alcine doodled on it.
	[diary_doodle]AmberelmMap.png[/img]
	
